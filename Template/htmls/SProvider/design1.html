{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Service Provider</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: url("{% static 'images/bg.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            font-family: Arial;
        }

        h1 {
            color: red;
            text-align: center;
        }

        .topnav {
            background-color: #812;
            overflow: hidden;
            padding: 10px;
        }

        .topnav a {
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            display: inline-block;
        }

        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

        .main {
            padding: 30px;
        }
    </style>
</head>

<body>

<h1>Crop Recommender System Using Machine Learning Approach</h1>

<!-- NAVBAR -->
<div class="topnav">
    {% block navbar %}
    <a href="#">Home</a>
    {% endblock %}
</div>

<!-- CONTENT -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
